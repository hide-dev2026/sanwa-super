<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三和スーパーAPP</title>
  <link rel="stylesheet" href="style.css">

  <!-- ★ PWA 用 manifest -->
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1 id="header-title">生鮮館　三和スーパー</h1>
  </header>

  <div id="home" class="page">
    <button id="notify-btn">🔔 通知設定</button>

    <section class="sale-section">
      <h2>本日の特売情報</h2>
      <div id="sales-list">
        <!-- CSVから読み込んだ特売アイテムがここに挿入される -->
      </div>
    </section>

    <!-- ★ お店からのお知らせ -->
    <section class="notice-section">
      <h2>お店からのお知らせ</h2>
      <div id="notice-list">
        <!-- お知らせがここに挿入される -->
      </div>
    </section>

    <!-- ★ 商品情報 -->
    <section class="product-section">
      <h2>商品情報</h2>
      <div id="product-list">
        <!-- 商品カードがここに挿入される -->
      </div>
    </section>
  </div> <!-- /#home -->

  <div id="store" class="page" style="display:none;">
    <h2>生鮮館株式会社 三和スーパー</h2>

    <!-- ★ 営業情報 -->
    <p class="store-hours">
      営業日　: 月曜日〜土曜日<br>
      営業時間: 9:00〜18:00<br>
      定休日　: 日曜日
    </p>
    <p>〒729-3107 広島県福山市新市町大字常1811-1</p>
    <!-- ★ お問い合わせ -->
    <p>お問い合わせ先: <a href="mailto:info@sanwa-super.jp">info@sanwa-super.jp</a></p>
    <button onclick="window.open('https://www.google.com/maps?q=広島県福山市新市町大字常1811-1')">
    🗺 地図を開く
    </button>

    <button onclick="window.location.href='tel:0847-53-8973'">📞 03-1234-5678</button>
    <button onclick="showPage('home')">ホームに戻る</button>
  </div>

  <footer>
    <button onclick="showPage('home')">🏠 ホーム</button>
    <button onclick="showPage('store')">📍 お店情報</button>
  </footer>

  <script src="app.js"></script>

  <!-- ★ Service Worker 登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>
